# transitively pinned by:
#   - aws-smithy-http-client 1.1.12 (latest) -> rustls 0.21.12 -> rustls-webpki 0.101.7
#
# libsql replaced by turso crate (2026-04-25), removing the 0.102.8 path.
# Revisit whenever aws-config publishes a new release moving to newer rustls.
#
# Last reviewed: 2026-04-25

[advisories]
ignore = [
    "RUSTSEC-2026-0098",  # name constraints URI accept — transitive only (0.101.7, 0.102.8)
    "RUSTSEC-2026-0099",  # name constraints wildcard accept — transitive only (0.101.7, 0.102.8)
    "RUSTSEC-2026-0049",  # CRL distribution-point matching — transitive only (0.102.8)
]
